<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air team map</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #f9f8f6; color: #1a1a1a; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 3rem 1rem 4rem; }
    @media (prefers-color-scheme: dark) { body { background: #111; color: #e8e8e8; } }
    .card { background: #fff; border-radius: 16px; border: 1px solid rgba(0,0,0,0.08); padding: 2.5rem 2rem; max-width: 640px; width: 100%; }
    @media (prefers-color-scheme: dark) { .card { background: #1c1c1c; border-color: rgba(255,255,255,0.08); } }
    .eyebrow { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #888; margin-bottom: 0.5rem; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 0.4rem; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 2rem; }
    .chart-wrap { position: relative; width: 100%; height: 420px; margin-bottom: 1.5rem; }
    .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 1.5rem; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .take-btn { display: inline-block; padding: 10px 22px; border-radius: 10px; font-size: 14px; font-weight: 500; background: #6c63ff; color: #fff; text-decoration: none; border: none; cursor: pointer; }
    .take-btn:hover { background: #5a52e0; }
    .loading { font-size: 14px; color: #aaa; padding: 2rem 0; text-align: center; }
    .count { font-size: 13px; color: #aaa; margin-bottom: 1rem; }
  </style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Air personality quiz</div>
  <h1>The team map</h1>
  <div class="subtitle">Everyone who's taken the quiz so far.</div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#e07b50"></div>Lawful evil (Shane × Jeff)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#d4537e"></div>Chaotic evil (Shane × Ari)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#639922"></div>Chaotic good (Ari × Tyler)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#378add"></div>Lawful good (Jeff × Tyler)</div>
  </div>

  <div id="loading" class="loading">Loading the map…</div>
  <div id="count" class="count" style="display:none"></div>
  <div class="chart-wrap" style="display:none" id="chart-wrap">
    <canvas id="teamChart"></canvas>
  </div>

  <a href="/" class="take-btn">Take the quiz</a>
</div>

<script>
var RESULTS = {
  ll: { name: "Lawful evil",  dot: "#e07b50" },
  ul: { name: "Chaotic evil", dot: "#d4537e" },
  ur: { name: "Chaotic good", dot: "#639922" },
  lr: { name: "Lawful good",  dot: "#378add" }
};

async function load() {
  try {
    var res = await fetch('/api/results');
    if (!res.ok) throw new Error('failed');
    var data = await res.json();
    var named = data.filter(function(d) { return d.name; });
    document.getElementById('loading').style.display = 'none';
    document.getElementById('chart-wrap').style.display = 'block';
    var countEl = document.getElementById('count');
    countEl.style.display = 'block';
    countEl.textContent = named.length + ' ' + (named.length === 1 ? 'person' : 'people') + ' on the map so far';
    drawChart(named);
  } catch(e) {
    document.getElementById('loading').textContent = 'Couldn\'t load the map right now.';
  }
}

function drawChart(allResults) {
  var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  var gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
  var textColor = isDark ? '#888' : '#aaa';

  var quadDatasets = Object.keys(RESULTS).map(function(key) {
    var r = RESULTS[key];
    var pts = allResults.filter(function(e) { return e.key === key; }).map(function(e) { return { x: e.x, y: e.y, label: e.name }; });
    return { label: r.name, data: pts, backgroundColor: r.dot + 'cc', pointRadius: 10, pointHoverRadius: 12 };
  });

  var quadPlugin = {
    id: 'quadBg',
    beforeDraw: function(chart) {
      var ca = chart.chartArea, c = chart.ctx, mx = ca.left + ca.width/2, my = ca.top + ca.height/2;
      [{x:ca.left,y:my,    w:mx-ca.left, h:ca.bottom-my, col:isDark?'rgba(200,120,90,0.13)':'rgba(240,160,130,0.18)'},
       {x:ca.left,y:ca.top,w:mx-ca.left, h:my-ca.top,    col:isDark?'rgba(210,110,150,0.13)':'rgba(240,150,185,0.18)'},
       {x:mx,y:ca.top,     w:ca.right-mx,h:my-ca.top,    col:isDark?'rgba(110,180,100,0.13)':'rgba(160,215,130,0.18)'},
       {x:mx,y:my,         w:ca.right-mx,h:ca.bottom-my, col:isDark?'rgba(80,130,210,0.13)':'rgba(150,195,245,0.18)'}
      ].forEach(function(q) { c.save(); c.fillStyle=q.col; c.fillRect(q.x,q.y,q.w,q.h); c.restore(); });
    }
  };

  var labelPlugin = {
    id: 'quadLabels',
    afterDraw: function(chart) {
      var ca = chart.chartArea, c = chart.ctx, pad = 10;
      c.save();
      c.font = '11px -apple-system,BlinkMacSystemFont,sans-serif';
      c.fillStyle = isDark ? 'rgba(255,255,255,0.22)' : 'rgba(0,0,0,0.18)';
      c.textAlign='left';  c.fillText('Chaotic evil',  ca.left+pad,  ca.top+15);
      c.textAlign='right'; c.fillText('Chaotic good',  ca.right-pad, ca.top+15);
      c.textAlign='left';  c.fillText('Lawful evil',   ca.left+pad,  ca.bottom-8);
      c.textAlign='right'; c.fillText('Lawful good',   ca.right-pad, ca.bottom-8);
      c.restore();
    }
  };

  var namePlugin = {
    id: 'nameLabels',
    afterDatasetsDraw: function(chart) {
      var c = chart.ctx;
      c.save(); c.textAlign = 'center';
      chart.data.datasets.forEach(function(ds, di) {
        var meta = chart.getDatasetMeta(di);
        var r = RESULTS[Object.keys(RESULTS)[di]];
        ds.data.forEach(function(pt, pi) {
          if (!pt.label) return;
          var el = meta.data[pi]; if (!el) return;
          c.font = '600 11px -apple-system,BlinkMacSystemFont,sans-serif';
          c.fillStyle = isDark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.55)';
          c.fillText(pt.label, el.x, el.y - 14);
        });
      });
      c.restore();
    }
  };

  new Chart(document.getElementById('teamChart'), {
    type: 'scatter',
    data: { datasets: quadDatasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: function(ctx) { return ctx.raw.label || ''; } } }
      },
      scales: {
        x: { min: -1.5, max: 1.5, grid: { color: gridColor }, border: { color: gridColor },
          ticks: { color: textColor, maxTicksLimit: 5, callback: function(v) { if(v===-1.5) return '← Shane'; if(v===1.5) return 'Tyler →'; return ''; } } },
        y: { min: -1.5, max: 1.5, grid: { color: gridColor }, border: { color: gridColor },
          ticks: { color: textColor, maxTicksLimit: 5, callback: function(v) { if(v===1.5) return 'Ari ↑'; if(v===-1.5) return 'Tous ↓'; return ''; } } }
      },
      layout: { padding: { top: 24, bottom: 8, left: 8, right: 8 } }
    },
    plugins: [quadPlugin, labelPlugin, namePlugin]
  });
}

load();
</script>
</body>
</html>
